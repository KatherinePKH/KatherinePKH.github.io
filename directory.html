<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>功能目录页</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef2ff;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page-shell {
      text-align: center;
      padding: 36px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      max-width: 520px;
      width: min(92vw, 520px);
    }
    .page-shell h1 {
      margin: 0 0 16px;
      font-size: 1.9rem;
    }
    .page-shell p {
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 1rem;
      line-height: 1.6;
    }
    .entry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .entry-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <h1>功能目录页</h1>
    <p>请选择下面的入口继续访问功能页面。</p>
    <a class="entry-btn" href="admin-dashboard.html">管理端工作台</a>
  </main>
</body>
</html>
