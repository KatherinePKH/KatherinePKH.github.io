<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>功能目录页</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef2ff;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page-shell {
      text-align: center;
      padding: 36px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      max-width: 520px;
      width: min(92vw, 520px);
    }
    .page-shell h1 {
      margin: 0 0 16px;
      font-size: 1.9rem;
    }
    .page-shell p {
      margin: 0;
      color: #6b7280;
      font-size: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <h1>功能目录页</h1>
    <p>暂无其他页面信息。</p>
  </main>
</body>
</html>
