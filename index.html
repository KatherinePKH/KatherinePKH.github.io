<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Index导航页</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 45%, #6366f1 100%);
    }

    .login-shell {
      width: min(420px, 92vw);
      background: rgba(255, 255, 255, 0.98);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.22);
      padding: 30px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      text-align: center;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: #111827;
    }

    .brand p {
      margin: 10px 0 0;
      color: #6b7280;
      font-size: 0.96rem;
    }

    .login-form {
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 0.92rem;
      color: #4b5563;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #4b5563;
      font-size: 0.92rem;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: #7c3aed;
    }

    .forgot {
      font-size: 0.92rem;
      color: #7c3aed;
      text-decoration: none;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #9ca3af;
      font-size: 0.88rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .alt-login {
      display: grid;
      gap: 12px;
    }

    .alt-btn {
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 0.98rem;
      background: white;
      color: #111827;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .alt-btn:hover {
      background: #f9fafb;
      border-color: #c7d2fe;
    }

    .note {
      text-align: center;
      color: #6b7280;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .note a {
      color: #4f46e5;
      text-decoration: none;
    }

    .note a:hover {
      text-decoration: underline;
    }

    @media (max-width: 360px) {
      .login-shell {
        padding: 24px 18px 22px;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell" role="main">
    <section class="brand">
      <h1>欢迎回来</h1>
      <p>请输入你的账号和密码继续登录</p>
    </section>

    <form class="login-form" id="loginForm" autocomplete="on">
      <div class="field">
        <label for="account">手机号 / 邮箱</label>
        <input type="text" id="account" name="account" placeholder="请输入手机号或邮箱" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required minlength="6" />
      </div>

      <div class="actions">
        <label class="remember">
          <input type="checkbox" id="remember" name="remember" />
          记住我
        </label>
        <a class="forgot" href="#">忘记密码？</a>
      </div>

      <button class="submit-btn" type="submit">登录</button>
    </form>

    <div class="divider">或使用</div>

    <div class="alt-login">
      <button class="alt-btn" type="button">使用微信登录</button>
      <button class="alt-btn" type="button">使用手机号快捷登录</button>
    </div>

    <p class="note">
      没有账号？ <a href="#">立即注册</a>
    </p>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const validAccount = '13666204489';
    const validPassword = '1234567890';

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const account = form.account.value.trim();
      const password = form.password.value.trim();
      if (!account || !password) {
        alert('请填写完整的登录信息');
        return;
      }
      if (account === validAccount && password === validPassword) {
        window.location.href = 'directory.html';
      } else {
        alert('账号或密码错误，请检查后重试');
      }
    });
  </script>
</body>
</html>
